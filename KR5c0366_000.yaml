front:
  text: 宋西太乙宫碑銘共序
  hash: sha256:c5e3872ebb1adda7b164f14febc08cee6d37ddfd1d41a44509c43254c3d0b0c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0366_HFL_000-001a, image: hfl/0610/0610-014.png}
body:
  text: 翰林學士兼侍讀學士玉清昭應宫判官臣宋綬奉勑撰維宋四葉天聖六年春三月作太乙宮于京城之西南陬星家之說太乙在紫宫門右北辰之神也掌十有六神之法度參居權衡以建皇極陰陽家之說太乙為元皇之使執計秉剛正天地之常兼統八卦肅成萬物道家之說元氣本於一一變而之九故太乙行九宫其壇場析醮具真仙官屬之品在昔帝軒轅治五氣接萬靈肇創重式究極其變立門置將與輝祲之候縱橫所舍吉凶所主後世悉神而明之詔于祝號總八十有一而尊神則十本乎十元六紀五行三政而為其名大抵上憩於星垣下循於宫元所至之分監觀不忒統人事以知來輔神道以禍淫罔弗淑而克昌疇惠迪而靡佑則張衡李雲蕭子顯之流又言之詳矣惟五福於行為木於德為仁其遊五宫其元五子凡甲子二百七十而一徙宫起乾位左旋歷三隅臨中央周而復始行棋之下無金革札瘥之沴物以豐阜民用愈樂初太宗御極之八年日官推策當以甲申歲去遼碣之野適斗牛之次乃築宫巽維候氣馭之來並設二遊四神三棋之像示裒對之儀度於前聞諗于有司粵若漢孝武立三一之祀畫諸臺室施及唐民乾元後為壇於國郊申之親祭太曆中置觀于石城表以年紀是皆章章於榮牘者稽參而損益之制定其當每四郊迎氣之日則展祠事麵牲苑菹量幣潔樽祝史陳其辭侍臣承焉其禮半太祀分至三元又備醮獻薰爐華燈紋素青章法侣宣其科中人涖焉其儀視靈寶真宗之嗣統也國有大事必先告之朝有成慶亦親款之皇帝率循丕法無廢常薦逮兹龍集戊辰又自黃室西趣坤隩復乃從居鄉之請用增祀之文就如其郊别營壇治審面叶卜距宜秋門一舍而近庀國工搜蒸徒礱材合土備物致用上御藥張懷德總其事入內殿頭皇甫繼和入內高品陳延達護其作執技殫乎目巧視成底乎神速作為四殿分揭華榜黃庭峙于中以尊五福君棋大遊寧禧繹于後以奉小遊延貺峨于東以寓天一四神臣棋資祐竦于西以宅地一直符民棋又采聖真景宿山川神靈繢形繚廊列於從祀署重扉曰顯頁延輝景集摽别殿曰清修為齊柭之所其外堂廡衆舍總四百餘區擇精鍊道士得元靖大師徐思簡等三十人處之祠醮儀法率用雍熙之舊先時祇祓震宫審摹睟表季秋壬寅以三洞威儀九部內樂導君棋諸像分置本殿翌日乘輿臨造稽首瞻對天正景至五福移御之辰乃迓其像焉前一日之昕上親侍慈顔同申謁拜命禮部尚書平章事張士遜持節充使增以黃麾氅眊武部辰旗萬乘步送至宮門輔臣趨餞出闕外二尊復升重觀眄仙衛城回仗轉清蹕始還是夕頓於新店夜漏既盡陽筒肇升館御即安嗣以齊獻來月生明之旦帝又輦如七年二月丁亥皇太后車駕繼往莫不省農扈觴從臣發禁則敷麗澤屈己面不辭其損涉遠而無憚於勞渠渠祗祗所敢述者恭惟國家神明之後淳耀惇太皇祖二宗皆顧諟明命勤禮恤祀荷百祿之總介群元之祉延洪于我皇仰席祖考之寵靈內禀太后之德訓虔鞏寅畏綏靖輯陸纍年于兹矣若太后之懿聖慈仁擁佑帝躬以承荷於先託皇上之欽明孝愛尊事母儀以講和於庶政動必慮憲居必思永清淨以崇道光華以右文用能昭其馨香而格于上下珍物薦至嘉生乃報面猶潔粢盛謹候穰和諸神秩百禮禮所從者宜稱神所享者優裕繇是壯麗靚深以表之苾芬庶侈以羞之舊史云天地之神隨王所在又四望之祭乃不即之名因其方焉奚有遠邇之異是二祠宮之建也率不離於吉土得非王者域四海子兆姓在奉三無私面已禔福之廣靡不欲其遍及冥真報降豈局於一隅哉彼鶉咮井絡之疆猶黃圖之右劍時敷錫罄無弗宜事神保民厥惟至矣則真祖之制法文祖之相宇其善述善繼者歟精微之妙用推保右之默定揚欽崇之克誠歌輪奂之全盛史臣承詔攄文銘石曰瞻穆穆兮新宮野平夷兮氣鬱葱邈鴻紛兮赫昈神之留兮安以豫雲甍鱗瓦槩朱天沈揄為席敷瓊筵空歌羽帔事薰然物純備兮誠吉蠲宅璿樞兮臨紫宙括萬邦兮蒙福祐祚吾君兮奉文母壽而昌兮等穹厚宋西太乙宮碑銘
